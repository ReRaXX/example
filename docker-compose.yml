version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: user-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - user-api-network

  user-api:
    build: .
    container_name: user-api-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: userapi
      JWT_ACCESS_SECRET: your-super-secret-access-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
    depends_on:
      - postgres
    networks:
      - user-api-network

volumes:
  postgres_data:

networks:
  user-api-network:
    driver: bridge
